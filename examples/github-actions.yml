name: ContextClean failed-log example

on:
  workflow_dispatch:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - name: Install ContextClean
        run: cargo install --git https://github.com/karurikwao/contextclean contextclean-cli --locked
      - name: Run tests and capture log
        shell: bash
        run: |
          set +e
          cargo test --workspace --all-features --locked 2>&1 | tee failed-log.txt
          status=${PIPESTATUS[0]}
          exit "$status"
      - uses: karurikwao/contextclean@main
        if: failure()
        with:
          log-file: failed-log.txt
          output: ctxclean-failure.md
          max-tokens: "8000"
