name: Bug report
description: Report broken or surprising behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the behavior and the command you ran.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Output of `ctxclean --version`, package version, or commit SHA.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: install-method
    attributes:
      label: Install or run method
      description: For example `cargo run`, `cargo install --path`, release binary, or package manager.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the command, small safe input, and expected output. Do not paste secrets.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Command output
      description: Paste sanitized stdout/stderr. Do not paste secrets.
