[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "contextclean"
version = "0.1.0"
description = "Thin Python wrapper for the ContextClean CLI."
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [{ name = "ContextClean contributors" }]
keywords = ["llm", "ai-agents", "context-engineering", "token-optimization"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Topic :: Software Development",
  "Topic :: Text Processing",
]

[project.urls]
Homepage = "https://contextclean.pages.dev/"
Repository = "https://github.com/karurikwao/contextclean"
Issues = "https://github.com/karurikwao/contextclean/issues"

[tool.hatch.build.targets.wheel]
packages = ["contextclean"]
